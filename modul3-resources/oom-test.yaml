apiVersion: v1
kind: Pod
metadata:
  name: oom-target-pod
  namespace: default
spec:
  containers:
  - name: memory-hog
    image: alexeiled/stress-ng # Świetny obraz do testów obciążeniowych
    args: ["--vm", "1", "--vm-bytes", "10M", "--timeout", "60s"] # Prosi o 50MB RAMu
    resources:
      requests:
        memory: "20Mi"
        cpu: "100m"
      limits:
        memory: "20Mi" # Limit to tylko 20Mi! (QoS: Guaranteed)
        cpu: "200m"