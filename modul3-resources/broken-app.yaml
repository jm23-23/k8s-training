apiVersion: apps/v1
kind: Deployment
metadata:
  name: fragile-app
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fragile
  template:
    metadata:
      labels:
        app: fragile
    spec:
      containers:
      - name: web
        image: nginx:1.31.1-alpine-slim # ⚠️ Błędny tag obrazu - wywoła ImagePullBackOff
        ports:
        - containerPort: 80